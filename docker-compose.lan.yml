services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: open-meetup-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${LAN_PORT:-8080}:80"

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: open-meetup-server
    restart: unless-stopped
    depends_on:
      - minio
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3001
      HOST_PASSWORD: "${HOST_PASSWORD:-12345678}"
      CORS_ALLOW_ORIGIN: "*"
      TRUST_PROXY: "1"
      ROOM_CLEANUP_INTERVAL_MS: "${ROOM_CLEANUP_INTERVAL_MS:-30000}"
      ASSET_STORAGE_PROVIDER: minio
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-open-meetup-assets}"
      MINIO_REGION: "${MINIO_REGION:-us-east-1}"

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: open-meetup-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio-data:/data

volumes:
  minio-data:
